<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Codewars Leaderboard</title>
        <link rel="stylesheet" href="./assets/style.css">
    </head>

    <body>

        <h1>Codewars Leaderboard</h1>
        <form id="user-form">
            <label for="user-input">Enter Codewars usernames</label>
            <input
                id="user-input"
                type="text"
            >
            <button type="submit">Generate Leaderboard</button>
        </form>

        <label for="language-select">Ranking:</label>
        <select id="language-select"></select>

        <p id="error-message" aria-live="polite"></p>

        <table id="leaderboard-table">
            <caption>Leaderboard ranking for selected Codewars users</caption>
            <thead>
                <tr>
                    <th scope="col">Username</th>
                    <th scope="col">Clan</th>
                    <th scope="col">Score</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
        </table>

        <script type="module" src="./src/index.mjs"></script>

    </body>
</html>
